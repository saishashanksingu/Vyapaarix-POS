version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: supermarket-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: supermarket
    volumes:
      - mongodb_data:/data/db
    networks:
      - supermarket-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supermarket-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/supermarket
      NODE_ENV: development
      PORT: 5000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app/backend
    networks:
      - supermarket-network
    command: npm start --prefix backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: supermarket-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - supermarket-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  supermarket-network:
    driver: bridge
