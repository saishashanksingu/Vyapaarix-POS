name: Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm i -g @railway/cli
          railway link ${{ secrets.RAILWAY_PROJECT_ID }}
          
          # Set environment variables for production
          railway variable set NODE_ENV=production
          railway variable set PORT=5000
          
          # Deploy the application
          railway up --detach
          
      - name: Get Railway URL and Status
        id: railway
        run: |
          railway status
          echo "✅ Backend deployment completed"
          echo "Monitor at: https://railway.app/dashboard"
          
      - name: Notify Deployment Success
        run: |
          echo "✅ Backend deployed to Railway"
          echo "API Health: https://[your-railway-project].up.railway.app/api/health"
          echo "MongoDB: Railway MongoDB plugin configured"
